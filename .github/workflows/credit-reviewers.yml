name: Credit PR reviewers

# When a PR touching a blog post is merged, add every editor who reviewed it to
# that post's `editor:` frontmatter list, unless already listed. "Reviewed"
# means any of: a formal review, an inline review comment, or a conversation
# comment on the PR. Candidates are gated on membership of the
# @genomicsxai/editors team, so authors and community members who comment are
# never added. Editors are recorded as GitHub logins.
#
# `editor:` is a metadata-only field (not rendered on the site), stored as a
# YAML flow list, e.g. `editor: ["dwgoblue", "Al-Murphy"]`. A legacy single
# string value is migrated to a one-item list the first time it is touched.

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to credit (for testing / backfill)'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: read

concurrency:
  # Serialise pushes to main so two merges can't race on the same file.
  group: credit-reviewers-main
  cancel-in-progress: false

jobs:
  credit:
    # Only run for merged PRs (skip PRs that were closed without merging).
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Deploy key so the credit commit can push to the protected main branch
          # (the ruleset bypasses deploy keys; github.token cannot push to main).
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

      - name: Credit reviewers on changed blog posts
        env:
          GH_TOKEN: ${{ github.token }}
          # read:org token, used only to read the editors team roster.
          EDITORS_TOKEN: ${{ secrets.GH_EDITORS_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          python3 - <<'PYEOF'
          import os, re, subprocess

          repo = os.environ["REPO"]
          pr = os.environ["PR"]
          editors_token = os.environ.get("EDITORS_TOKEN", "")

          def gh(path, jq, token=None):
              env = os.environ.copy()
              if token:
                  env["GH_TOKEN"] = token
              out = subprocess.run(
                  ["gh", "api", "--paginate", path, "-q", jq],
                  capture_output=True, text=True, check=True, env=env,
              ).stdout
              return [l.strip() for l in out.splitlines() if l.strip()]

          # Only credit members of the @genomicsxai/editors team. If the roster
          # can't be read, skip rather than risk crediting non-editors.
          roster = {l.lower() for l in
                    gh("/orgs/genomicsxai/teams/editors/members", ".[].login",
                       token=editors_token)} if editors_token else set()
          if not roster:
              print("Could not read editor team roster — skipping to avoid crediting non-editors.")
              raise SystemExit(0)

          # Blog posts changed by this PR (content/blogs/<slug>/index.md only).
          changed = [f for f in gh(f"/repos/{repo}/pulls/{pr}/files", ".[].filename")
                     if re.match(r"^content/blogs/[^/]+/index\.md$", f)]
          if not changed:
              print("No blog posts changed in this PR — nothing to credit.")
              raise SystemExit(0)

          # Reviewed = formal review, inline review comment, or conversation comment.
          logins = set(gh(f"/repos/{repo}/pulls/{pr}/reviews", ".[].user.login"))
          logins |= set(gh(f"/repos/{repo}/pulls/{pr}/comments", ".[].user.login"))
          logins |= set(gh(f"/repos/{repo}/issues/{pr}/comments", ".[].user.login"))

          # The PR author reviewing their own post doesn't count.
          pr_author = gh(f"/repos/{repo}/pulls/{pr}", ".user.login")[0].lower()

          # Keep only editors; drop bots and the author. Stable order.
          reviewers = sorted(
              l for l in logins
              if l and not l.endswith("[bot]")
              and l.lower() != pr_author and l.lower() in roster
          )
          if not reviewers:
              print("No eligible editor-reviewers found on this PR.")
              raise SystemExit(0)

          def parse_list(val):
              val = val.strip()
              if val.startswith("[") and val.endswith("]"):
                  items = [x.strip().strip('"').strip("'") for x in val[1:-1].split(",")]
                  return [x for x in items if x]
              val = val.strip('"').strip("'")
              return [val] if val else []

          for path in changed:
              if not os.path.exists(path):
                  continue
              with open(path, encoding="utf-8") as f:
                  text = f.read()

              m = re.search(r"^(editor:[ \t]*)(.*)$", text, re.MULTILINE)
              if not m:
                  print(f"WARNING: no editor: field in {path}, skipping.")
                  continue
              current = parse_list(m.group(2))

              # The submitter reviewing their own post doesn't count either.
              sm = re.search(r"^submitter_github:[ \t]*(.+)$", text, re.MULTILINE)
              submitter = sm.group(1).strip().strip('"').strip("'").lower() if sm else ""

              existing = {c.lower() for c in current}
              to_add = [r for r in reviewers
                        if r.lower() not in existing and r.lower() != submitter]
              if not to_add:
                  print(f"{path}: editor-reviewers already credited, no change.")
                  continue

              merged = current + to_add
              new_line = m.group(1) + "[" + ", ".join(f'"{x}"' for x in merged) + "]"
              text = text[:m.start()] + new_line + text[m.end():]
              with open(path, "w", encoding="utf-8") as f:
                  f.write(text)
              print(f"{path}: credited {to_add}")
          PYEOF

      - name: Commit and push
        run: |
          if [ -z "$(git status --porcelain -- content/blogs)" ]; then
            echo "No frontmatter changes to commit."
            exit 0
          fi
          PR="${{ github.event.pull_request.number || github.event.inputs.pr }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # origin is an SSH remote (deploy key from checkout above); pushes to main.
          git add content/blogs/*/index.md
          git commit -m "chore: credit reviewers on merged PR #${PR}"
          git push origin HEAD:main
