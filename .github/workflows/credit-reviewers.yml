name: Credit PR reviewers

# When a PR touching a blog post is merged, add every reviewer (formal reviews
# + inline review-comment authors) to that post's `editor:` frontmatter list,
# unless they are already listed. Reviewers are recorded as GitHub logins.
#
# `editor:` is a metadata-only field (not rendered on the site), stored as a
# YAML flow list, e.g. `editor: ["dwgoblue", "Al-Murphy"]`. A legacy single
# string value is migrated to a one-item list the first time it is touched.

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to credit (for testing / backfill)'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: read

concurrency:
  # Serialise pushes to main so two merges can't race on the same file.
  group: credit-reviewers-main
  cancel-in-progress: false

jobs:
  credit:
    # Only run for merged PRs (skip PRs that were closed without merging).
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Credit reviewers on changed blog posts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          python3 - <<'PYEOF'
          import os, re, subprocess

          repo = os.environ["REPO"]
          pr = os.environ["PR"]

          def gh(path, jq):
              out = subprocess.run(
                  ["gh", "api", "--paginate", f"/repos/{repo}/{path}", "-q", jq],
                  capture_output=True, text=True, check=True,
              ).stdout
              return [l.strip() for l in out.splitlines() if l.strip()]

          # Blog posts changed by this PR (content/blogs/<slug>/index.md only).
          changed = [f for f in gh(f"pulls/{pr}/files", ".[].filename")
                     if re.match(r"^content/blogs/[^/]+/index\.md$", f)]
          if not changed:
              print("No blog posts changed in this PR — nothing to credit.")
              raise SystemExit(0)

          # Reviewers = formal review authors + inline review-comment authors.
          logins = set(gh(f"pulls/{pr}/reviews", ".[].user.login"))
          logins |= set(gh(f"pulls/{pr}/comments", ".[].user.login"))

          # The PR author reviewing their own post doesn't count.
          pr_author = subprocess.run(
              ["gh", "api", f"/repos/{repo}/pulls/{pr}", "-q", ".user.login"],
              capture_output=True, text=True, check=True,
          ).stdout.strip().lower()

          # Drop bots and the author; keep a stable, deterministic order.
          reviewers = sorted(
              l for l in logins
              if l and not l.endswith("[bot]") and l.lower() != pr_author
          )
          if not reviewers:
              print("No eligible reviewers found on this PR.")
              raise SystemExit(0)

          def parse_list(val):
              val = val.strip()
              if val.startswith("[") and val.endswith("]"):
                  items = [x.strip().strip('"').strip("'") for x in val[1:-1].split(",")]
                  return [x for x in items if x]
              val = val.strip('"').strip("'")
              return [val] if val else []

          for path in changed:
              if not os.path.exists(path):
                  continue
              with open(path, encoding="utf-8") as f:
                  text = f.read()

              m = re.search(r"^(editor:[ \t]*)(.*)$", text, re.MULTILINE)
              if not m:
                  print(f"WARNING: no editor: field in {path}, skipping.")
                  continue
              current = parse_list(m.group(2))

              # The submitter reviewing their own post doesn't count either.
              sm = re.search(r"^submitter_github:[ \t]*(.+)$", text, re.MULTILINE)
              submitter = sm.group(1).strip().strip('"').strip("'").lower() if sm else ""

              existing = {c.lower() for c in current}
              to_add = [r for r in reviewers
                        if r.lower() not in existing and r.lower() != submitter]
              if not to_add:
                  print(f"{path}: reviewers already credited, no change.")
                  continue

              merged = current + to_add
              new_line = m.group(1) + "[" + ", ".join(f'"{x}"' for x in merged) + "]"
              text = text[:m.start()] + new_line + text[m.end():]
              with open(path, "w", encoding="utf-8") as f:
                  f.write(text)
              print(f"{path}: credited {to_add}")
          PYEOF

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- content/blogs)" ]; then
            echo "No frontmatter changes to commit."
            exit 0
          fi
          PR="${{ github.event.pull_request.number || github.event.inputs.pr }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add content/blogs/*/index.md
          git commit -m "chore: credit reviewers on merged PR #${PR}"
          git push
